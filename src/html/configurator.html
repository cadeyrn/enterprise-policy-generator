<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="extension_name"></title>
    <link rel="stylesheet" href="../css/ui.css">
    <link rel="preload" href="../images/locked.svg" as="image" type="image/svg+xml">
    <link rel="icon" type="image/svg" href="../images/icon.svg">
  </head>
  <body>
    <div id="page-container">
      <header id="header">
        <div id="logo">
          <img src="../images/logo-large.webp" width="305" height="46" alt="">
        </div>
        <search id="filter-wrapper">
          <label for="filter" data-i18n="filter_field"></label>
          <input type="text" id="filter" data-i18n-placeholder="filter_field" aria-keyshortcuts="Shift+F" tabindex="-1">
          <button type="button" class="filter-button open-filter" data-i18n-title="filter_field_open" aria-controls="filter" aria-expanded="false" aria-keyshortcuts="Shift+F">
            <svg class="filter-icon filter-icon-search" viewBox="0 0 20 20" aria-hidden="true">
              <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd"></path>
            </svg>
          </button>
          <button type="button" class="filter-button close-filter" data-i18n-title="filter_field_close" aria-keyshortcuts="Escape" tabindex="-1">
            <svg class="filter-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12"></path>
              <path d="m18 6-12 12"></path>
            </svg>
          </button>
        </search>
      </header>
      <h1 class="visually-hidden" data-i18n="extension_name"></h1>
      <main id="main">
        <h2 class="visually-hidden" data-i18n="generate_headline"></h2>
        <form id="generator-form" tabindex="-1" novalidate></form>
        <section id="secondary-section" tabindex="-1">
          <section class="output-panel" aria-labelledby="policy-output-title">
            <div class="output-toolbar">
              <div class="output-header">
                <h2 id="policy-output-title" data-i18n="output_headline"></h2>
              </div>
            </div>
            <div class="output-action">
              <button type="button" id="generate" class="button" data-i18n="generate_button" aria-keyshortcuts="Shift+G"></button>
            </div>
            <div class="policy-output-container">
              <pre id="policy-output-wrapper" class="policy-output-code"><code id="policy-output"></code><span class="output-placeholder" data-i18n="output_placeholder"></span></pre>
              <button type="button" id="show-policy-output-fullscreen" class="output-fullscreen-button" data-i18n-title="output_fullscreen_open" aria-controls="policy-output-fullscreen-dialog">
                <svg viewBox="0 0 20 20" aria-hidden="true">
                  <path d="M4.5 8V4.5H8"></path>
                  <path d="M4.5 4.5 8.5 8.5"></path>
                  <path d="M12 4.5h3.5V8"></path>
                  <path d="M15.5 4.5l-4 4"></path>
                  <path d="M8 15.5H4.5V12"></path>
                  <path d="M4.5 15.5l4-4"></path>
                  <path d="M15.5 12v3.5H12"></path>
                  <path d="M15.5 15.5l-4-4"></path>
                </svg>
              </button>
            </div>
            <div id="action-links" class="action-links hidden">
              <button type="button" id="copy-to-clipboard">
                <img src="../images/clipboard.svg" width="20" height="20" alt="">
                <span data-i18n="link_copy_to_clipboard"></span>
              </button>
              <div id="copy-to-clipboard-popover" class="popover" popover="manual" role="status" aria-live="polite" aria-atomic="true" data-i18n="copy_to_clipboard_success"></div>
              <button type="button" id="grant-download-permission">
                <img src="../images/download.svg" width="20" height="20" alt="">
                <span data-i18n="link_download"></span>
              </button>
              <button type="button" id="download" class="hidden">
                <img src="../images/download.svg" width="20" height="20" alt="">
                <span data-i18n="link_download"></span>
              </button>
              <button type="button" id="save-configuration">
                <img src="../images/save.svg" width="20" height="20" alt="">
                <span data-i18n="link_save_configuration"></span>
              </button>
            </div>
          </section>
          <details class="help-box">
            <summary data-i18n="explanation_headline"></summary>
            <div>
              <p data-i18n="explanation_intro"></p>
              <p>
                <strong>Microsoft Windows:</strong> <span data-i18n="explanation_intro_windows"></span><br><br>
                <strong>Apple macOS:</strong> <span data-i18n="explanation_intro_macos"></span><br><br>
                <strong>Linux:</strong> <span data-i18n="explanation_intro_linux"></span>
              </p>
              <p data-i18n="explanation_about_policies"></p>
            </div>
          </details>
          <section class="configuration-panel" aria-labelledby="configuration-panel-title">
            <h2 id="configuration-panel-title" data-i18n="configuration_management_headline"></h2>
            <div class="action-links">
              <button type="button" id="list-configurations">
                <img src="../images/settings.svg" width="20" height="20" alt="">
                <span data-i18n="link_load_configuration"></span>
              </button>
              <button type="button" id="import-configuration">
                <img src="../images/export.svg" width="20" height="20" alt="">
                <span data-i18n="configuration_import"></span>
              </button>
            </div>
          </section>
          <div class="promo-box">
            <p data-i18n="promo_box_text"></p>
            <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
              <input type="hidden" name="cmd" value="_s-xclick">
              <input type="hidden" name="hosted_button_id" value="MKMVX68BGCHRW">
              <button type="submit" class="button" data-i18n="promo_box_button"></button>
            </form>
          </div>
        </section>
      </main>
      <footer id="footer">
        <a href="https://www.soeren-hentzschel.at/?utm_campaign=webext&utm_term=enterprise" target="_blank" rel="noopener">
          <span><span data-i18n="extension_name"></span> © 2026, soeren-hentzschel.at</span>
        </a>
      </footer>
    </div>
    <dialog id="policy-output-fullscreen-dialog" class="output-fullscreen-dialog" aria-labelledby="policy-output-fullscreen-title">
      <header>
        <div id="policy-output-fullscreen-title" data-i18n="output_headline"></div>
        <div class="output-fullscreen-actions">
          <button type="button" id="copy-to-clipboard-fullscreen" class="output-fullscreen-copy" data-i18n-title="link_copy_to_clipboard">
            <img src="../images/clipboard.svg" width="20" height="20" alt="">
          </button>
          <button type="button" id="close-policy-output-fullscreen" class="output-fullscreen-close" data-i18n-title="output_fullscreen_close">
            <span class="visually-hidden" data-i18n="output_fullscreen_close"></span>
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <path d="m5 5 10 10"></path>
              <path d="m15 5-10 10"></path>
            </svg>
          </button>
        </div>
      </header>
      <div class="content">
        <pre id="policy-output-fullscreen-wrapper" class="policy-output-code"><code id="policy-output-fullscreen"></code></pre>
      </div>
    </dialog>
    <dialog id="save-configuration-dialog" aria-labelledby="save-configuration-dialog-header">
      <header id="save-configuration-dialog-header">
        <div data-i18n="save_dialog_window_title"></div>
      </header>
      <div class="content">
        <form>
          <div>
            <label for="save-dialog-name" data-i18n="save_dialog_form_name"></label>
            <input type="text" name="save-dialog-name" id="save-dialog-name" autofocus>
          </div>
        </form>
      </div>
      <aside>
        <button type="button" id="button-save-dialog-cancel" class="button secondary-action">
          <span data-i18n="common_dialog_btn_cancel"></span>
          <span aria-hidden="true" data-i18n="common_dialog_btn_cancel"></span>
        </button>
        <button type="button" id="button-save-dialog-ok" class="button primary-action" disabled>
          <span data-i18n="save_dialog_btn_ok"></span>
        </button>
      </aside>
    </dialog>
    <dialog id="configuration-list-dialog" aria-labelledby="configuration-list-dialog-header">
      <header id="configuration-list-dialog-header">
        <div data-i18n="list_dialog_window_title"></div>
      </header>
      <div class="content">
        <div id="no-saved-configurations" class="hidden" data-i18n="list_dialog_no_saved_configurations"></div>
        <table id="list-configurations-table" class="hidden">
          <thead>
            <tr>
              <th data-i18n="list_table_name"></th>
              <th class="time" data-i18n="list_table_time"></th>
              <th class="actions" data-i18n="list_table_actions"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <aside>
        <button type="button" id="button-list-dialog-cancel" class="button secondary-action" autofocus>
          <span data-i18n="common_dialog_btn_cancel"></span>
          <span aria-hidden="true" data-i18n="common_dialog_btn_cancel"></span>
        </button>
      </aside>
    </dialog>
    <dialog id="import-configuration-dialog" aria-labelledby="import-configuration-dialog-header">
      <header>
        <div id="import-configuration-dialog-header" data-i18n="configuration_import"></div>
      </header>
      <div class="content">
        <form>
          <div>
            <label for="import-dialog-name" data-i18n="save_dialog_form_name"></label>
            <input type="text" name="import-dialog-name" id="import-dialog-name" autofocus>
          </div>
          <div class="file-input-wrapper">
            <input type="file" id="import-file-input" accept=".policy">
          </div>
        </form>
      </div>
      <aside>
        <button type="button" id="button-import-config-cancel" class="button secondary-action">
          <span data-i18n="common_dialog_btn_cancel"></span>
          <span aria-hidden="true" data-i18n="common_dialog_btn_cancel"></span>
        </button>
        <button type="button" id="button-import-config-ok" class="button primary-action" disabled>
          <span data-i18n="configuration_import"></span>
        </button>
      </aside>
    </dialog>
    <dialog id="incompatible-configuration-dialog" class="restricted-width" aria-labelledby="incompatible-configuration-dialog-header">
      <header>
        <div id="incompatible-configuration-dialog-header" data-i18n="configuration_incompatible_title"></div>
      </header>
      <div class="content text-only">
        <p data-i18n="configuration_incompatible_intro"></p>
        <ul>
          <li data-i18n="configuration_incompatible_bullet_1"></li>
          <li data-i18n="configuration_incompatible_bullet_2"></li>
          <li data-i18n="configuration_incompatible_bullet_3"></li>
        </ul>
      </div>
      <aside>
        <button type="button" id="button-incompatible-config-cancel" class="button secondary-action">
          <span data-i18n="common_dialog_btn_cancel"></span>
          <span aria-hidden="true" data-i18n="common_dialog_btn_cancel"></span>
        </button>
        <button type="button" id="button-incompatible-config-ok" class="button primary-action">
          <span data-i18n="configuration_incompatible_btn_get_in_touch"></span>
        </button>
      </aside>
    </dialog>
    <script src="../js/lib/i18n.js"></script>
    <script src="../js/lib/dom.js"></script>
    <script src="../js/lib/sortable.js"></script>
    <script src="../js/core/serializer.js"></script>
    <script src="../js/core/policyManager.js"></script>
    <script src="../js/core/output.js"></script>
    <script src="../js/core/configurator.js"></script>
    <script src="../js/core/migrator.js"></script>
    <script src="../js/core/management.js"></script>
  </body>
</html>
